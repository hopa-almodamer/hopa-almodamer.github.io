<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="cache.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMODAMER | HOPA & HAKIM</title>
    <style>
        body {
            background: radial-gradient(circle at center, #001a33 0%, #000810 100%);
            color: #ffffff;
            text-align: center;
            font-family: sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .container {
            background: rgba(0, 10, 20, 0.9);
            border: 3px solid #00ffcc;
            border-radius: 25px;
            padding: 15px 20px;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.6);
            width: 350px;
        }
        .logo { width: 110px; height: auto; border-radius: 12px; margin-bottom: 5px; }
        
        h1 {
            color: #00ffcc;
            font-size: 2em;
            margin: 5px 0;
            text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; /* نيون قوي */
        }

        .hack-text {
            color: #ffffff;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc; /* نيون لاسمك */
            margin-bottom: 10px;
            display: block;
        }

        #status {
            color: #ffcc00;
            font-size: 1.1em;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 0 0 10px #ffcc00;
        }

        .btn {
            background: linear-gradient(45deg, #1d6e2c, #2ea043);
            color: white;
            padding: 15px 45px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.4em;
            font-weight: bold;
            box-shadow: 0 0 25px rgba(46, 160, 67, 0.7);
            margin-bottom: 15px;
        }

        .footer {
            border-top: 2px solid rgba(0, 255, 204, 0.3);
            padding-top: 10px;
        }

        /* اضاءة نيون قوية للاسماء */
        .neon-name {
            color: #00ffcc;
            font-size: 1.4em;
            font-weight: bold;
            text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
            display: block;
        }

        .neon-num {
            color: #ffffff;
            font-size: 1.2em;
            direction: ltr;
            display: block;
            margin-bottom: 10px;
            text-shadow: 0 0 8px #00ffcc;
        }

        .service { color: #888; font-size: 0.8em; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="ALMODAMER" class="logo">
        
        <h1>المدمر | ALMODAMER</h1>
        
        <span class="hack-text">PS4 9.00 HACK BY HOPA</span>
        
        <div id="status">جاهز للتفعيل | Ready</div>
        
        <button class="btn" onclick="startExploit()">GOLDHEN | START</button>
        
        <div class="footer">
            <span class="neon-name">هوبا | HOPA</span>
            <span class="neon-num">0942578649</span>
            
            <span class="neon-name">حكيم | HAKIM</span>
            <span class="neon-num">0925483921</span>
            
            <p class="service">مركز صيانة وتحميل الألعاب</p>
        </div>
    </div>

    <script type="module">
        import { psfree } from './psfree.mjs';
        window.startExploit = async function() {
            document.getElementById('status').innerHTML = "جاري التفعيل...";
            try { await psfree(); } catch (e) { document.getElementById('status').innerHTML = "فشل!"; }
        };
    </script>
</body>
</html>
