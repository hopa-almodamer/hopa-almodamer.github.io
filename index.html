<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="cache.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMODAMER HOST | HOPA & HAKIM</title>
    <style>
        body {
            background: radial-gradient(circle at center, #001a33 0%, #000810 100%);
            color: #ffffff;
            text-align: center;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: rgba(0, 10, 20, 0.9);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            max-width: 90%;
        }
        .logo {
            width: 110px;
            height: auto;
            margin-bottom: 5px;
            border-radius: 8px;
        }
        h1 {
            color: #00ffcc;
            font-size: 1.8em;
            margin: 5px 0;
            text-shadow: 0 0 10px #00ffcc;
        }
        .sys-info {
            color: #ccc;
            font-size: 0.8em;
            margin-bottom: 10px;
        }
        #status {
            color: #ffcc00;
            font-size: 1.1em;
            margin: 10px 0;
            font-weight: bold;
        }
        .btn {
            background: linear-gradient(45deg, #1d6e2c, #2ea043);
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
        }
        .footer {
            margin-top: 15px;
            border-top: 1px solid rgba(0, 255, 204, 0.2);
            padding-top: 10px;
        }
        /* عرض الأسماء بجانب بعضها لضمان الظهور */
        .contact-box {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .dev-info {
            flex: 1;
        }
        .name {
            color: #00ffcc;
            font-size: 1.1em;
            font-weight: bold;
        }
        .phone {
            color: #ffffff;
            font-size: 0.9em;
            direction: ltr;
            display: block;
        }
        .service-text {
            color: #666;
            font-size: 0.7em;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="ALMODAMER" class="logo">
        
        <h1>المدمر | ALMODAMER</h1>
        <div class="sys-info">PS4 9.00 NO-USB JAILBREAK</div>
        
        <div id="status">جاهز للتفعيل | Ready</div>
        
        <button class="btn" onclick="startExploit()">تشغيل GOLDHEN | START</button>
        
        <div class="footer">
            <div class="contact-box">
                <div class="dev-info">
                    <span class="name">هوبا | HOPA</span>
                    <span class="phone">0942578649</span>
                </div>
                <div class="dev-info">
                    <span class="name">حكيم | HAKIM</span>
                    <span class="phone">0925483921</span>
                </div>
            </div>
            <p class="service-text">مركز صيانة وتحميل الألعاب | Game Service</p>
        </div>
    </div>

    <script type="module">
        import { psfree } from './psfree.mjs';
        window.startExploit = async function() {
            const statusBox = document.getElementById('status');
            statusBox.innerHTML = "جاري التفعيل...";
            try { await psfree(); } catch (e) { statusBox.innerHTML = "فشل! أعد المحاولة"; }
        };
        window.applicationCache.addEventListener('cached', () => {
            document.getElementById('status').innerHTML = "تم الحفظ أوفلاين";
        }, false);
    </script>
</body>
</html>
