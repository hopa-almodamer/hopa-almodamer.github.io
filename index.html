<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="cache.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMODAMER | HOPA & HAKIM</title>
    <style>
        body {
            background: radial-gradient(circle at center, #001a33 0%, #000810 100%);
            color: #ffffff;
            text-align: center;
            font-family: sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .container {
            background: rgba(0, 10, 20, 0.9);
            border: 3px solid #00ffcc;
            border-radius: 25px;
            padding: 10px 20px;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.6);
            width: 350px;
        }
        .logo { width: 100px; height: auto; border-radius: 12px; margin-bottom: 5px; }
        h1 { color: #00ffcc; font-size: 1.8em; margin: 5px 0; text-shadow: 0 0 20px #00ffcc; }
        .hack-text { color: #ffffff; font-size: 1.1em; font-weight: bold; text-shadow: 0 0 15px #00ffcc; margin-bottom: 8px; display: block; }
        #status { color: #ffcc00; font-size: 1em; margin: 10px 0; font-weight: bold; text-shadow: 0 0 10px #ffcc00; }
        .btn { background: linear-gradient(45deg, #1d6e2c, #2ea043); color: white; padding: 12px 40px; border: none; border-radius: 12px; cursor: pointer; font-size: 1.3em; font-weight: bold; box-shadow: 0 0 20px rgba(46, 160, 67, 0.6); margin-bottom: 12px; }
        .footer { border-top: 1px solid rgba(0, 255, 204, 0.3); padding-top: 8px; }
        .neon-name { color: #00ffcc; font-size: 1.2em; font-weight: bold; text-shadow: 0 0 10px #00ffcc; display: block; }
        .neon-num { color: #ffffff; font-size: 1em; direction: ltr; display: block; margin-bottom: 5px; }

        /* العنوان المطلوب مع نيون */
        .address-box {
            color: #00ffcc;
            font-size: 0.95em;
            font-weight: bold;
            margin-top: 8px;
            text-shadow: 0 0 10px #00ffcc; /* نيون للعنوان */
            border: 1px dashed rgba(0, 255, 204, 0.3);
            padding: 5px;
            border-radius: 10px;
        }
        
        .service { color: #888; font-size: 0.7em; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="ALMODAMER" class="logo">
        <h1>المدمر | ALMODAMER</h1>
        <span class="hack-text">PS4 9.00 HACK BY HOPA</span>
        <div id="status">جاهز للتفعيل | Ready</div>
        <button class="btn" onclick="startExploit()">GOLDHEN | START</button>
        <div class="footer">
            <span class="neon-name">هوبا | HOPA</span>
            <span class="neon-num">0942578649</span>
            <span class="neon-name">حكيم | HAKIM</span>
            <span class="neon-num">0925483921</span>
            
            <div class="address-box">
                المرج - سوق فلسطين - ساحة الأمان
            </div>
            
            <p class="service">مركز صيانة وتحميل الألعاب</p>
        </div>
    </div>
    <script type="module">
        import { psfree } from './psfree.mjs';
        window.startExploit = async function() {
            document.getElementById('status').innerHTML = "جاري التفعيل...";
            try { await psfree(); } catch (e) { document.getElementById('status').innerHTML = "فشل!"; }
        };
    </script>
</body>
</html>
