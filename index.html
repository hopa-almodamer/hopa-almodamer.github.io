<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="almodamer.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMODAMER | HAKIM & HOPA</title>
    <style>
        body {
            background: radial-gradient(circle at center, #001a33 0%, #000810 100%);
            color: #ffffff; text-align: center; font-family: sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        /* واجهة الموقع مخفية في البداية */
        #main-content { display: none; }

        .container {
            background: rgba(0, 10, 20, 0.9); border: 3px solid #00ffcc;
            border-radius: 25px; padding: 20px; width: 350px;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.6);
        }
        
        /* شاشة التحميل تظهر تلقائياً في البداية */
        #cache-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; /* إجبار الظهور */
            flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
        #progress-container { width: 80%; background: #222; border-radius: 10px; height: 25px; margin-top: 20px; border: 2px solid #00ffcc; }
        #progress-bar { width: 0%; height: 100%; background: #00ffcc; border-radius: 10px; transition: width 0.2s; }
        
        .logo { width: 100px; height: auto; border-radius: 12px; margin-bottom: 5px; }
        h1 { color: #00ffcc; font-size: 1.8em; text-shadow: 0 0 20px #00ffcc; }
        .btn { background: linear-gradient(45deg, #1d6e2c, #2ea043); color: white; padding: 12px 40px; border: none; border-radius: 12px; font-size: 1.3em; font-weight: bold; }
        .footer { border-top: 1px solid rgba(0, 255, 204, 0.3); padding-top: 8px; }
        .neon-name { color: #00ffcc; font-size: 1.2em; font-weight: bold; display: block; }
        .neon-num { color: #ffffff; font-size: 1em; direction: ltr; display: block; }
    </style>
</head>
<body>

    <div id="cache-overlay">
        <img src="logo.jpg" style="width: 80px; margin-bottom: 20px; border-radius: 50%;">
        <h2 id="cache-status" style="color: #00ffcc;">جاري تأمين الموقع (OFFLINE)...</h2>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <p id="cache-percent" style="margin-top: 15px; font-size: 1.5em; font-weight: bold;">0%</p>
    </div>

    <div id="main-content" class="container">
        <img src="logo.jpg" alt="ALMODAMER" class="logo">
        <h1>المدمر | ALMODAMER</h1>
        <div id="status" style="color: #ffcc00; margin-bottom: 10px;">تم التحميل بنجاح</div>
        
        <button class="btn" onclick="startExploit()">تفعيل التهكير | START</button>
        
        <div class="footer">
            <span class="neon-name">حكيم | HAKIM</span>
            <span class="neon-num">0916483921</span>
            <span class="neon-name">هوبا | HOPA</span>
            <span class="neon-num">0942578649</span>
            <div style="color: #00ffcc; font-size: 0.9em; margin-top: 5px;">المرج - سوق فلسطين</div>
        </div>
    </div>

    <script>
        var appCache = window.applicationCache;
        var overlay = document.getElementById('cache-overlay');
        var mainContent = document.getElementById('main-content');
        var progressBar = document.getElementById('progress-bar');
        var percentText = document.getElementById('cache-percent');

        // دالة تنهي شاشة التحميل وتظهر الموقع
        function showSite() {
            overlay.style.display = 'none';
            mainContent.style.display = 'block';
        }

        // إذا كان الموقع محفوظاً مسبقاً، افتحه فوراً
        if (appCache.status === appCache.IDLE) {
            showSite();
        }

        appCache.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                var percent = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percent + '%';
                percentText.innerHTML = percent + '%';
            }
        }, false);

        appCache.addEventListener('cached', function() {
            percentText.innerHTML = "100%";
            progressBar.style.width = '100%';
            setTimeout(showSite, 1000); 
        }, false);

        appCache.addEventListener('noupdate', function() { showSite(); }, false);
        appCache.addEventListener('updateready', function() { appCache.swapCache(); window.location.reload(); }, false);
        appCache.addEventListener('error', function() { showSite(); }, false);
    </script>

    <script type="module">
        import { psfree } from './psfree.mjs';
        window.startExploit = async function() {
            document.getElementById('status').innerHTML = "جاري التفعيل...";
            try { await psfree(); } catch (e) { document.getElementById('status').innerHTML = "فشل!"; }
        };
    </script>
</body>
</html>
