<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="almodamer.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMODAMER | HAKIM & HOPA</title>
    <style>
        body {
            background: radial-gradient(circle at center, #001a33 0%, #000810 100%);
            color: #ffffff; text-align: center; font-family: sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .container {
            background: rgba(0, 10, 20, 0.9); border: 3px solid #00ffcc;
            border-radius: 25px; padding: 20px; width: 350px;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.6);
        }
        /* تصميم العداد */
        #cache-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        #progress-container { width: 80%; background: #222; border-radius: 10px; height: 20px; margin-top: 15px; border: 1px solid #00ffcc; }
        #progress-bar { width: 0%; height: 100%; background: #00ffcc; border-radius: 10px; box-shadow: 0 0 15px #00ffcc; transition: width 0.3s; }
        
        .logo { width: 100px; height: auto; border-radius: 12px; margin-bottom: 5px; }
        h1 { color: #00ffcc; font-size: 1.8em; margin: 5px 0; text-shadow: 0 0 20px #00ffcc; }
        .btn { 
            background: linear-gradient(45deg, #1d6e2c, #2ea043); color: white; 
            padding: 12px 40px; border: none; border-radius: 12px; 
            cursor: pointer; font-size: 1.3em; font-weight: bold; margin-bottom: 12px; 
        }
        .footer { border-top: 1px solid rgba(0, 255, 204, 0.3); padding-top: 8px; }
        .neon-name { color: #00ffcc; font-size: 1.2em; font-weight: bold; display: block; text-shadow: 0 0 10px #00ffcc; }
        .neon-num { color: #ffffff; font-size: 1em; direction: ltr; display: block; margin-bottom: 5px; }
        .address-box { color: #00ffcc; font-size: 0.9em; font-weight: bold; margin-top: 8px; text-shadow: 0 0 5px #00ffcc; }
    </style>
</head>
<body>

    <div id="cache-overlay">
        <h2 id="cache-status" style="color: #00ffcc;">جاري حفظ ملفات الكاش...</h2>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <p id="cache-percent" style="margin-top: 10px;">0%</p>
    </div>

    <div class="container">
        <img src="logo.jpg" alt="ALMODAMER" class="logo">
        <h1>المدمر | ALMODAMER</h1>
        <div id="status" style="color: #ffcc00; margin-bottom: 10px;">جاهز للتفعيل</div>
        
        <button class="btn" onclick="startExploit()">GOLDHEN | START</button>
        
        <div class="footer">
            <span class="neon-name">حكيم | HAKIM</span>
            <span class="neon-num">0916483921</span>
            
            <span class="neon-name">هوبا | HOPA</span>
            <span class="neon-num">0942578649</span>
            
            <div class="address-box">المرج - سوق فلسطين - ساحة الأمان</div>
        </div>
    </div>

    <script>
        var appCache = window.applicationCache;
        var overlay = document.getElementById('cache-overlay');
        var progressBar = document.getElementById('progress-bar');
        var percentText = document.getElementById('cache-percent');

        appCache.addEventListener('downloading', function() { overlay.style.display = 'flex'; }, false);
        appCache.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                var percent = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percent + '%';
                percentText.innerHTML = percent + '%';
            }
        }, false);
        appCache.addEventListener('cached', function() {
            document.getElementById('cache-status').innerHTML = "تم الحفظ! يمكنك العمل أوفلاين";
            setTimeout(function() { overlay.style.display = 'none'; }, 2500);
        }, false);
        appCache.addEventListener('updateready', function() { appCache.swapCache(); window.location.reload(); }, false);
        appCache.addEventListener('error', function() { overlay.style.display = 'none'; }, false);
    </script>

    <script type="module">
        import { psfree } from './psfree.mjs';
        window.startExploit = async function() {
            document.getElementById('status').innerHTML = "جاري التفعيل...";
            try { await psfree(); } catch (e) { document.getElementById('status').innerHTML = "فشل!"; }
        };
    </script>
</body>
</html>
